
<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TheHardwareGuru</title>
<style>
body{margin:0;font-family:Arial;background:#05070d;color:white}
.hero{
height:95vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.95)),
url('https://images.unsplash.com/photo-1534423861386-85a16f5d13fd') center/cover;
}
h1{font-size:80px;background:linear-gradient(90deg,#00ffee,#a855f7);-webkit-background-clip:text;color:transparent}
.btn{padding:20px 40px;border-radius:50px;text-decoration:none;font-weight:bold;margin:10px;display:inline-block}
.live{background:#00ffee;color:#000}
.yt{background:#ff0033;color:#fff}
.section{max-width:1200px;margin:auto;padding:80px 20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:25px}
.card{background:#0f172a;padding:18px;border-radius:18px}
img{width:100%;border-radius:14px}
</style>
</head>
<body>

<div class="hero">
<h1>THEHARDWAREGURU</h1>
<a class="btn live" href="https://kick.com/thehardwareguru">SLEDOVAT LIVE</a>
<a class="btn yt" href="https://www.youtube.com/@TheHardwareGuru_Czech">YOUTUBE</a>
</div>

<div class="section">
<h2>POSLEDNÍ YOUTUBE SHORTS</h2>
<div id="shorts" class="grid"></div>
</div>

<script>
const API="https://YOUR_BACKEND_URL";

fetch(API+"/api/shorts").then(r=>r.json()).then(list=>{
document.getElementById("shorts").innerHTML=list.map(v=>
`<div class="card">
<img src="${v.thumbnail}">
<h3>${v.title}</h3>
<a class="btn yt" href="${v.url}">Otevřít</a>
</div>`).join("");
});
</script>

</body>
</html>
