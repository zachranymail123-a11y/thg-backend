<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TheHardwareGuru | Gaming Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:Orbitron,Arial;background:#0b0f14;color:#fff;text-align:center}
header{padding:40px 20px;background:linear-gradient(90deg,#111827,#020617)}
h1{font-size:42px;margin:0;color:#00ffcc}
.container{padding:40px 20px;max-width:900px;margin:auto}
.btn{display:inline-block;margin:10px;padding:14px 26px;border-radius:10px;text-decoration:none;color:#000;font-weight:bold;background:#00ff88}
.box{margin:20px auto;padding:20px;background:#111827;border-radius:12px}
.status{font-size:20px;margin:20px}
.online{color:#00ff88}
.offline{color:#888}
</style>
</head>
<body>
<header>
<h1>THEHARDWAREGURU</h1>
<div id="status" class="status">Načítám...</div>
<a class="btn" href="https://kick.com/thehardwareguru" target="_blank">WATCH LIVE ON KICK</a>
<a class="btn" href="https://youtube.com/@thehardwareguru" target="_blank">YouTube</a>
</header>
<div class="container">
<div class="box"><h2>Aktuální hra</h2><div id="game">Načítám...</div></div>
<div class="box"><h2>Popis</h2><div id="desc"></div></div>
</div>
<script>
async function load(){
 try{
   const r=await fetch("https://YOUR-RAILWAY-URL/api/live",{cache:"no-store"});
   const d=await r.json();
   if(!d || !d.title){
     document.getElementById("status").innerHTML='<span class="offline">OFFLINE</span>';
     document.getElementById("game").innerText="Stream je offline.";
     return;
   }
   document.getElementById("status").innerHTML='<span class="online">LIVE NOW</span>';
   document.getElementById("game").innerText=d.title;
   document.getElementById("desc").innerText=d.description||"";
 }catch{
   document.getElementById("status").innerHTML='<span class="offline">OFFLINE</span>';
 }
}
load();
</script>
</body>
</html>
