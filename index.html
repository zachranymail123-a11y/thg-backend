
<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TheHardwareGuru.cz | Hardcore Gaming & Hardware</title>
<meta name="description" content="TheHardwareGuru - hardcore gaming stream, gameplay, hardware a komunita. Sleduj live stream a objev hry.">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#05070f;
  color:#fff;
  font-family:Inter;
}
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:radial-gradient(circle at top,#0f172a,#020617);
}
h1{
  font-family:Orbitron;
  font-size:4rem;
  color:#00ffe1;
  text-shadow:0 0 40px #00ffe1;
  margin:0;
}
.cta{
  background:linear-gradient(45deg,#00ffe1,#00aaff);
  color:#000;
  padding:22px 60px;
  border-radius:16px;
  font-size:1.7rem;
  font-weight:900;
  text-decoration:none;
  margin:30px 0;
  box-shadow:0 0 40px #00ffe1;
}
.socials{
  display:flex;
  gap:20px;
  margin-top:10px;
}
.btn{
  padding:14px 22px;
  border-radius:10px;
  text-decoration:none;
  font-weight:700;
}
.kick{background:#53fc18;color:#000}
.yt{background:#ff0000;color:#fff}
.dc{background:#5865F2;color:#fff}
.status{
  font-weight:900;
  font-size:1.4rem;
  margin-top:15px;
}
.online{color:#ff2d55}
.offline{color:#888}
.section{
  max-width:1000px;
  margin:60px auto;
  background:#020617;
  padding:50px;
  border-radius:20px;
  border:1px solid #00ffe1;
  box-shadow:0 0 50px rgba(0,255,225,0.2);
  text-align:center;
}
.section h2{
  font-family:Orbitron;
  color:#00ffe1;
}
footer{
  text-align:center;
  opacity:0.6;
  padding:40px;
}
a{color:#00ffe1}
</style>
</head>

<body>

<section class="hero">
<h1>TheHardwareGuru</h1>

<a class="cta" href="https://kick.com/thehardwareguru" target="_blank">
▶ SLEDOVAT LIVE STREAM
</a>

<div class="socials">
<a class="btn kick" href="https://kick.com/thehardwareguru" target="_blank">Kick</a>
<a class="btn yt" href="https://www.youtube.com/@TheHardwareGuru_Czech" target="_blank">YouTube</a>
<a class="btn dc" href="https://discord.com/invite/n7xThr8" target="_blank">Discord</a>
</div>

<div id="status" class="status offline">Načítám live status…</div>
</section>

<section class="section">
<h2>🎮 Aktuální / poslední hra</h2>
<h3 id="gameTitle">Načítám…</h3>
<p id="gameDesc">Generuji AI popis…</p>
<div id="ytLink"></div>
</section>

<footer>
© 2026 TheHardwareGuru.cz | Hardcore Gaming & Tech
</footer>

<script>
const API="https://thg-backend-production.up.railway.app";

async function loadGame(){

  const r=await fetch('/.netlify/functions/game-info');
  const live=await r.json();

  const game=live.title;
  document.getElementById("gameTitle").innerText=game;

  const g=await fetch(API+"/api/game/"+encodeURIComponent(game));
  const data=await g.json();

  document.getElementById("gameDesc").innerHTML=data.description+`
  <br><br>
  <a href="${API}/api/game/${data.slug}" target="_blank">▶ Celý článek o hře</a>
  `;

  if(live.youtube){
    document.getElementById("ytLink").innerHTML=`
    <p><a href="${live.youtube}" target="_blank">▶ Poslední záznam na YouTube</a></p>
    `;
  }

  const s=document.getElementById("status");
  if(live.live){
    s.innerText="🔴 STREAM JE ONLINE";
    s.className="status online";
  }else{
    s.innerText="⚫ STREAM JE OFFLINE";
    s.className="status offline";
  }
}

loadGame();
</script>

</body>
</html>
