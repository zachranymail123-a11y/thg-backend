
<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TheHardwareGuru</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
<h1>THEHARDWAREGURU</h1>
<p>Chill gameplay • real reakce • AI v chatu</p>
<a href="https://kick.com/thehardwareguru" class="livebtn">🔴 WATCH LIVE</a>
</header>

<section class="block">
<h2>Poslední stream</h2>
<a id="kickLink" target="_blank" class="card">Načítám...</a>
</section>

<section class="block">
<h2>Poslední shorts</h2>
<div id="shorts" class="shorts"></div>
</section>

<script>
const API="https://thg-backend-production.up.railway.app";

async function load(){
  const k=await fetch(API+"/api/kick-last").then(r=>r.json());
  if(k.url){
    document.getElementById("kickLink").href=k.url;
    document.getElementById("kickLink").innerText="Klikni na poslední záznam streamu";
  }

  const s=await fetch(API+"/api/shorts").then(r=>r.json());
  const box=document.getElementById("shorts");
  s.forEach(v=>{
    box.innerHTML+=`<a href="${v.url}" target="_blank"><img src="${v.thumb}"><p>${v.title}</p></a>`;
  });
}
load();
</script>

</body>
</html>
