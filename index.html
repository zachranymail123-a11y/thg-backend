<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TheHardwareGuru | LIVE Gaming Stream</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#04060c;color:#fff;font-family:Inter}
.hero{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:radial-gradient(circle at center,#0b1229 0%,#02040a 70%)}
h1{font-family:Orbitron;font-size:5rem;background:linear-gradient(90deg,#00ffe1,#00aaff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 40px rgba(0,255,225,0.6)}
.cta{margin-top:30px;background:linear-gradient(45deg,#00ffe1,#00aaff);color:#000;padding:24px 70px;font-size:1.8rem;font-weight:900;border-radius:18px;text-decoration:none;box-shadow:0 0 50px #00ffe1}
.socials{margin-top:25px;display:flex;gap:16px}
.btn{padding:14px 24px;border-radius:12px;font-weight:700;text-decoration:none}
.kick{background:#53fc18;color:#000}
.yt{background:#ff0000;color:#fff}
.dc{background:#5865F2;color:#fff}
.status{margin-top:18px;font-weight:900;font-size:1.4rem}
.online{color:#ff2d55}
.offline{color:#777}
.game-section{max-width:1100px;margin:80px auto;background:#020617;border-radius:25px;padding:60px;border:1px solid #00ffe1;text-align:center}
footer{text-align:center;opacity:.5;padding:60px}
a{color:#00ffe1}
</style>
</head>
<body>

<section class="hero">
<h1>TheHardwareGuru</h1>
<a class="cta" href="https://kick.com/thehardwareguru" target="_blank">▶ SLEDOVAT LIVE STREAM</a>

<div class="socials">
<a class="btn kick" href="https://kick.com/thehardwareguru" target="_blank">Kick</a>
<a class="btn yt" href="https://www.youtube.com/@TheHardwareGuru_Czech" target="_blank">YouTube</a>
<a class="btn dc" href="https://discord.com/invite/n7xThr8" target="_blank">Discord</a>
</div>

<div id="status" class="status offline">Načítám live status…</div>
</section>

<section class="game-section">
<h2>🎮 PRÁVĚ STREAMUJU</h2>
<h3 id="gameTitle">Načítám…</h3>
<p id="gameDesc">Generuji popis…</p>
<div id="ytLink"></div>
</section>

<footer>© 2026 TheHardwareGuru.cz | Hardcore Stream</footer>

<script>
const API="https://thg-backend-production.up.railway.app";

async function loadGame(){

  const r=await fetch('/.netlify/functions/game-info');
  const live=await r.json();

  document.getElementById("gameTitle").innerText=live.title;

  let cleanTitle = live.title
  .replace(/LIVE/gi, "")
  .replace(/\|.*$/, "")
  .replace(/[🔥🎮⭐✨]/g, "")
  .replace(/&amp;/g, "&")
  .trim();

document.getElementById("gameTitle").innerText = cleanTitle;

const g = await fetch(API + "/api/game/" + encodeURIComponent(cleanTitle));
  const data=await g.json();

  document.getElementById("gameDesc").innerHTML=data.description;

  if(live.youtube){
    document.getElementById("ytLink").innerHTML='<p><a href="'+live.youtube+'" target="_blank">▶ Poslední záznam na YouTube</a></p>';
  }

  const s=document.getElementById("status");
  if(live.live){
    s.innerText="🔴 STREAM JE ONLINE";
    s.className="status online";
  }else{
    s.innerText="⚫ STREAM JE OFFLINE";
    s.className="status offline";
  }
}

loadGame();
</script>

</body>
</html>
