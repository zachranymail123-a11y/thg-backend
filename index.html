<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TheHardwareGuru</title>
<style>
body{margin:0;background:#07070a;color:#fff;font-family:Arial}
.hero{padding:80px;text-align:center;background:radial-gradient(circle,#111,#000)}
.btn{display:inline-block;background:#00ffee;color:#000;padding:16px 26px;border-radius:10px;margin:8px;text-decoration:none;font-weight:bold}
.section{max-width:1000px;margin:auto;padding:60px 20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:#111;padding:20px;border-radius:12px}
img{width:100%;border-radius:10px}
</style>
</head>
<body>

<div class="hero">
<h1>THEHARDWAREGURU</h1>
<div id="live"></div>
<a class="btn" href="https://kick.com/thehardwareguru">WATCH LIVE</a>
<a class="btn" href="https://youtube.com">YOUTUBE</a>
</div>

<div class="section">
<h2>Last Stream</h2>
<div id="kick"></div>
</div>

<div class="section">
<h2>YouTube Shorts</h2>
<div id="shorts" class="grid"></div>
</div>

<script>
const API="https://YOUR_BACKEND_URL";

fetch(API+"/api/live").then(r=>r.json()).then(d=>{
 if(d?.title) document.getElementById("live").innerText=d.title;
});

fetch(API+"/api/kick-last").then(r=>r.json()).then(d=>{
 document.getElementById("kick").innerHTML=
 `<div class="card"><img src="${d.thumbnail}"><h3>${d.title}</h3><a class="btn" href="${d.url}">Watch</a></div>`;
});

fetch(API+"/api/shorts").then(r=>r.json()).then(list=>{
 document.getElementById("shorts").innerHTML=list.map(v=>
 `<div class="card"><img src="${v.thumbnail}"><h4>${v.title}</h4><a class="btn" href="${v.url}">Watch</a></div>`
 ).join("");
});
</script>

</body>
</html>
